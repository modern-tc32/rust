name: Build TC32 Rust Host Toolchain

on:
  workflow_dispatch:
  push:
    branches: ["main", "tc32"]
    paths:
      - ".github/workflows/build-tc32-host.yml"
      - "compiler/**"
      - "library/**"
      - "src/**"
      - "x.py"
  pull_request:
    paths:
      - ".github/workflows/build-tc32-host.yml"
      - "compiler/**"
      - "library/**"
      - "src/**"
      - "x.py"

permissions:
  contents: write

concurrency:
  group: tc32-rust-host-${{ github.ref }}
  cancel-in-progress: false

env:
  LLVM_REPOSITORY: modern-tc32/llvm-project
  LLVM_WORKFLOW_FILE: build-tc32-toolchain.yml
  LLVM_BRANCH: tc32-as-thumb-extension

jobs:
  resolve-llvm-run:
    name: Resolve LLVM artifact source
    runs-on: ubuntu-latest
    outputs:
      run_id: ${{ steps.resolve.outputs.run_id }}
    steps:
      - name: Resolve latest successful LLVM workflow run
        id: resolve
        shell: bash
        env:
          TOKEN: ${{ secrets.LLVM_REPO_READ_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TOKEN:-}" ]; then
            echo "LLVM_REPO_READ_TOKEN is not set" >&2
            exit 1
          fi
          API_URL="https://api.github.com/repos/$LLVM_REPOSITORY/actions/workflows/$LLVM_WORKFLOW_FILE/runs?branch=$LLVM_BRANCH&status=success&per_page=1"
          RESPONSE="$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$API_URL")"
          RUN_ID="$(python3 -c 'import json,sys; data=json.load(sys.stdin); runs=data.get("workflow_runs", []); print(runs[0]["id"] if runs else "")' <<<"$RESPONSE")"
          if [ -z "$RUN_ID" ]; then
            echo "No successful LLVM workflow run found for $LLVM_REPOSITORY:$LLVM_BRANCH ($LLVM_WORKFLOW_FILE)" >&2
            exit 1
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

  build-host:
    needs: resolve-llvm-run
    name: ${{ matrix.host }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: linux-amd64
            runs_on: ubuntu-latest
            host_triple: x86_64-unknown-linux-gnu
            is_windows: false
          - host: macos-arm64
            runs_on: macos-14
            host_triple: aarch64-apple-darwin
            is_windows: false
          - host: windows-amd64
            runs_on: windows-latest
            host_triple: x86_64-pc-windows-msvc
            is_windows: true

    steps:
      - name: Checkout Rust
        uses: actions/checkout@v5

      - name: Enable MSVC environment
        if: matrix.is_windows
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y python3 git

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          tar --version >/dev/null

      - name: Show tool versions (Unix)
        if: ${{ !matrix.is_windows }}
        shell: bash
        run: |
          set -euo pipefail
          python3 --version
          git --version

      - name: Show tool versions (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          python --version
          git --version

      - name: Init cargo submodule (Unix)
        if: ${{ !matrix.is_windows }}
        shell: bash
        run: |
          set -euo pipefail
          git submodule update --init --depth 1 src/tools/cargo

      - name: Init cargo submodule (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          git submodule update --init --depth 1 src/tools/cargo

      - name: Download LLVM artifact
        uses: actions/download-artifact@v4
        with:
          name: tc32-llvm-rust-llvm-${{ matrix.host }}
          repository: ${{ env.LLVM_REPOSITORY }}
          run-id: ${{ needs.resolve-llvm-run.outputs.run_id }}
          github-token: ${{ secrets.LLVM_REPO_READ_TOKEN }}
          path: llvm-artifact

      - name: Unpack LLVM artifact (Unix)
        if: ${{ !matrix.is_windows }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/llvm-toolchain"
          tar -xzf "$GITHUB_WORKSPACE/llvm-artifact/tc32-llvm-rust-llvm-${{ matrix.host }}.tar.gz" \
            -C "$GITHUB_WORKSPACE/llvm-toolchain"

      - name: Unpack LLVM artifact (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          $archive = Join-Path $env:GITHUB_WORKSPACE "llvm-artifact/tc32-llvm-rust-llvm-${{ matrix.host }}.zip"
          $dest = Join-Path $env:GITHUB_WORKSPACE "llvm-toolchain"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Expand-Archive -Path $archive -DestinationPath $dest -Force

      - name: Show unpacked LLVM tools (Unix)
        if: ${{ !matrix.is_windows }}
        shell: bash
        run: |
          set -euo pipefail
          LLVM_BIN="$GITHUB_WORKSPACE/llvm-toolchain/bin"
          "$LLVM_BIN/llvm-config" --version
          "$LLVM_BIN/FileCheck" --version
          "$LLVM_BIN/clang" --version
          "$LLVM_BIN/llc" --version
          "$LLVM_BIN/llvm-objdump" --version

      - name: Show unpacked LLVM tools (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          $llvmBin = Join-Path $env:GITHUB_WORKSPACE "llvm-toolchain/bin"
          & (Join-Path $llvmBin "llvm-config.exe") --version
          & (Join-Path $llvmBin "FileCheck.exe") --version
          & (Join-Path $llvmBin "clang.exe") --version
          & (Join-Path $llvmBin "llc.exe") --version
          & (Join-Path $llvmBin "llvm-objdump.exe") --version

      - name: Write bootstrap.toml (Unix)
        if: ${{ !matrix.is_windows }}
        shell: bash
        run: |
          set -euo pipefail
          LLVM_BIN="$GITHUB_WORKSPACE/llvm-toolchain/bin"
          cat > "$GITHUB_WORKSPACE/bootstrap.toml" <<EOF
          change-id = "ignore"

          [llvm]
          download-ci-llvm = false

          [build]
          build = "${{ matrix.host_triple }}"
          host = ["${{ matrix.host_triple }}"]
          target = ["${{ matrix.host_triple }}", "tc32-unknown-none-elf"]

          [rust]
          download-rustc = false
          llvm-tools = false

          [target.${{ matrix.host_triple }}]
          llvm-config = "$LLVM_BIN/llvm-config"
          llvm-filecheck = "$LLVM_BIN/FileCheck"
          llvm-has-rust-patches = false
          EOF

      - name: Write bootstrap.toml (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          $llvmBin = (Join-Path $env:GITHUB_WORKSPACE "llvm-toolchain/bin") -replace '\\','/'
          $content = @"
          change-id = "ignore"

          [llvm]
          download-ci-llvm = false

          [build]
          build = "${{ matrix.host_triple }}"
          host = ["${{ matrix.host_triple }}"]
          target = ["${{ matrix.host_triple }}", "tc32-unknown-none-elf"]

          [rust]
          download-rustc = false
          llvm-tools = false

          [target.${{ matrix.host_triple }}]
          llvm-config = "$llvmBin/llvm-config.exe"
          llvm-filecheck = "$llvmBin/FileCheck.exe"
          llvm-has-rust-patches = false
          "@
          Set-Content -Path (Join-Path $env:GITHUB_WORKSPACE "bootstrap.toml") -Value $content

      - name: Build stage1 Rust host toolchain (Unix)
        if: ${{ !matrix.is_windows }}
        shell: bash
        run: |
          set -euo pipefail
          python3 x.py build --stage 1 compiler/rustc src/tools/cargo

      - name: Build stage1 Rust host toolchain (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          python x.py build --stage 1 compiler/rustc src/tools/cargo

      - name: Verify stage1 rustc (Unix)
        if: ${{ !matrix.is_windows }}
        shell: bash
        run: |
          set -euo pipefail
          STAGE1="$GITHUB_WORKSPACE/build/${{ matrix.host_triple }}/stage1/bin/rustc"
          "$STAGE1" --version
          "$STAGE1" --print target-list | grep -Fx tc32-unknown-none-elf
          "$STAGE1" --print cfg --target tc32-unknown-none-elf | grep -Fx 'target_arch="tc32"'

      - name: Verify stage1 rustc (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          $stage1 = Join-Path $env:GITHUB_WORKSPACE "build/${{ matrix.host_triple }}/stage1/bin/rustc.exe"
          & $stage1 --version
          $targets = & $stage1 --print target-list
          if (-not ($targets | Select-String -Pattern '^tc32-unknown-none-elf$')) {
            throw "tc32-unknown-none-elf target is missing"
          }
          $cfg = & $stage1 --print cfg --target tc32-unknown-none-elf
          if (-not ($cfg | Select-String -Pattern '^target_arch="tc32"$')) {
            throw "tc32 target_arch cfg is missing"
          }

      - name: Package standalone toolchain (Unix)
        if: ${{ !matrix.is_windows }}
        shell: bash
        run: |
          set -euo pipefail
          HOST_TRIPLE="${{ matrix.host_triple }}"
          TOOLCHAIN_DIR="$GITHUB_WORKSPACE/tc32-stage1-$HOST_TRIPLE"
          SNAPSHOT_RUSTC="$(rustup which rustc)"
          SNAPSHOT_SYSROOT="$("$SNAPSHOT_RUSTC" --print sysroot)"
          rm -rf "$TOOLCHAIN_DIR"
          mkdir -p \
            "$TOOLCHAIN_DIR/bin" \
            "$TOOLCHAIN_DIR/lib" \
            "$TOOLCHAIN_DIR/llvm/bin" \
            "$TOOLCHAIN_DIR/llvm/lib" \
            "$TOOLCHAIN_DIR/snapshot/bin" \
            "$TOOLCHAIN_DIR/snapshot/lib"

          cp "build/bootstrap/debug/rustc" "$TOOLCHAIN_DIR/bin/rustc-bootstrap"
          cp "build/$HOST_TRIPLE/stage1/bin/rustc" "$TOOLCHAIN_DIR/bin/rustc-real"
          cp "build/$HOST_TRIPLE/stage1-tools-bin/cargo" "$TOOLCHAIN_DIR/bin/cargo-real"
          cp "$SNAPSHOT_RUSTC" "$TOOLCHAIN_DIR/snapshot/bin/rustc"
          cp -R "build/$HOST_TRIPLE/stage1/lib/." "$TOOLCHAIN_DIR/lib/"
          cp -R "$SNAPSHOT_SYSROOT/lib/." "$TOOLCHAIN_DIR/snapshot/lib/"
          cp -R "$GITHUB_WORKSPACE/llvm-toolchain/bin/." "$TOOLCHAIN_DIR/llvm/bin/"
          if [ -d "$GITHUB_WORKSPACE/llvm-toolchain/lib/clang" ]; then
            cp -R "$GITHUB_WORKSPACE/llvm-toolchain/lib/clang" "$TOOLCHAIN_DIR/llvm/lib/"
          fi

          cat > "$TOOLCHAIN_DIR/toolchain.toml" <<EOF
          host_triple = "$HOST_TRIPLE"
          target_triple = "tc32-unknown-none-elf"
          channel = "stage1-local"

          [paths]
          cargo = "bin/cargo"
          rustc = "bin/rustc"
          real_rustc = "bin/rustc-real"
          bootstrap_rustc = "bin/rustc-bootstrap"
          snapshot_rustc = "snapshot/bin/rustc"
          sysroot = "."
          llvm_bin = "llvm/bin"
          EOF

          cat > "$TOOLCHAIN_DIR/bin/rustc" <<'EOF'
          #!/bin/sh
          set -eu

          root=$(
              CDPATH= cd -- "$(dirname "$0")/.." && pwd
          )

          host_dylib_var() {
              case "$(uname -s)" in
                  Darwin) printf '%s\n' DYLD_FALLBACK_LIBRARY_PATH ;;
                  Linux) printf '%s\n' LD_LIBRARY_PATH ;;
                  *) printf '%s\n' LD_LIBRARY_PATH ;;
              esac
          }

          has_flag() {
              flag=$1
              shift
              for arg in "$@"; do
                  if [ "$arg" = "$flag" ]; then
                      return 0
                  fi
              done
              return 1
          }

          value_for_flag() {
              flag=$1
              shift
              prev=
              for arg in "$@"; do
                  if [ "$prev" = "$flag" ]; then
                      printf '%s\n' "$arg"
                      return 0
                  fi
                  case "$arg" in
                      "$flag="*)
                          printf '%s\n' "${arg#*=}"
                          return 0
                          ;;
                  esac
                  prev=$arg
              done
              return 1
          }

          version_query=0
          if has_flag "-vV" "$@"; then
              version_query=1
          fi

          target=
          if target=$(value_for_flag "--target" "$@"); then
              :
          else
              target=
          fi

          is_build_script=0
          if [ -z "$target" ] && [ "$version_query" -eq 0 ]; then
              is_build_script=1
          fi

          if [ "$is_build_script" -eq 1 ]; then
              compiler="$root/snapshot/bin/rustc"
              libdir="$root/snapshot/lib"
              set -- "$@"
          else
              compiler="$root/bin/rustc-real"
              libdir="$root/lib"
              if [ -n "$target" ] && ! has_flag "--sysroot" "$@"; then
                  set -- "$@" --sysroot "$root"
              fi
          fi

          dylib_var=$(host_dylib_var)
          eval "old_dylib_path=\${$dylib_var-}"
          if [ -n "${old_dylib_path:-}" ]; then
              new_dylib_path="$libdir:$old_dylib_path"
          else
              new_dylib_path="$libdir"
          fi

          env "$dylib_var=$new_dylib_path" "$compiler" "$@"
          EOF

          cat > "$TOOLCHAIN_DIR/bin/cargo" <<'EOF'
          #!/bin/sh
          set -eu

          root=$(
              CDPATH= cd -- "$(dirname "$0")/.." && pwd
          )

          export RUSTC="${RUSTC:-$root/bin/rustc}"
          export TC32_LLVM_BIN="${TC32_LLVM_BIN:-$root/llvm/bin}"
          export CARGO_TARGET_TC32_UNKNOWN_NONE_ELF_LINKER="${CARGO_TARGET_TC32_UNKNOWN_NONE_ELF_LINKER:-$root/llvm/bin/ld.lld}"

          exec "$root/bin/cargo-real" "$@"
          EOF

          chmod +x "$TOOLCHAIN_DIR/bin/rustc" "$TOOLCHAIN_DIR/bin/cargo"
          tar -czf "$GITHUB_WORKSPACE/tc32-rust-toolchain-${{ matrix.host }}.tar.gz" \
            -C "$GITHUB_WORKSPACE" "$(basename "$TOOLCHAIN_DIR")"

      - name: Inspect standalone toolchain inputs (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          $hostTriple = "${{ matrix.host_triple }}"
          $stage1Lib = Join-Path $env:GITHUB_WORKSPACE "build/$hostTriple/stage1/lib"
          $snapshotRustc = (rustup which rustc).Trim()
          $snapshotSysroot = (& $snapshotRustc --print sysroot).Trim()
          $snapshotLib = Join-Path $snapshotSysroot "lib"
          $reportDir = Join-Path $env:GITHUB_WORKSPACE "windows-packaging-report"
          Remove-Item -Recurse -Force $reportDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $reportDir | Out-Null

          function Show-TreeStats([string]$label, [string]$root, [string]$prefix) {
            Write-Host "##[group]$label"
            Write-Host "Root: $root"
            if (-not (Test-Path $root)) {
              Write-Host "Missing"
              "Missing: $root" | Set-Content -Path (Join-Path $reportDir "$prefix-summary.txt")
              Write-Host "##[endgroup]"
              return
            }

            $files = Get-ChildItem -LiteralPath $root -Recurse -Force -File -ErrorAction SilentlyContinue
            $dirs = Get-ChildItem -LiteralPath $root -Recurse -Force -Directory -ErrorAction SilentlyContinue
            $reparse = Get-ChildItem -LiteralPath $root -Recurse -Force -ErrorAction SilentlyContinue |
              Where-Object { $_.Attributes -band [IO.FileAttributes]::ReparsePoint }

            $fileCount = @($files).Count
            $dirCount = @($dirs).Count
            $reparseCount = @($reparse).Count
            $totalBytes = ($files | Measure-Object -Property Length -Sum).Sum
            if ($null -eq $totalBytes) { $totalBytes = 0 }
            $totalGiB = [Math]::Round($totalBytes / 1GB, 3)

            @(
              "Root: $root"
              "Files: $fileCount"
              "Directories: $dirCount"
              "Reparse points: $reparseCount"
              "Size bytes: $totalBytes"
              "Size GiB: $totalGiB"
            ) | Set-Content -Path (Join-Path $reportDir "$prefix-summary.txt")

            Write-Host "Files: $fileCount"
            Write-Host "Directories: $dirCount"
            Write-Host "Reparse points: $reparseCount"
            Write-Host "Size bytes: $totalBytes"
            Write-Host "Size GiB: $totalGiB"

            if ($reparseCount -gt 0) {
              Write-Host "Reparse points:"
              $reparseData = $reparse |
                Select-Object FullName, LinkType, Attributes, Target
              $reparseData |
                Format-Table -AutoSize | Out-String -Width 4096 |
                Write-Host
              $reparseData | Export-Csv -NoTypeInformation -Path (Join-Path $reportDir "$prefix-reparse-points.csv")
            }

            Write-Host "Largest files:"
            $largestFiles = $files |
              Sort-Object Length -Descending
            $largestFiles |
              Select-Object -First 20 FullName, Length |
              Format-Table -AutoSize | Out-String -Width 4096 |
              Write-Host
            $largestFiles | Select-Object FullName, Length |
              Export-Csv -NoTypeInformation -Path (Join-Path $reportDir "$prefix-files-by-size.csv")

            $dirSizes = @{}
            foreach ($file in $files) {
              $dir = Split-Path -Parent $file.FullName
              if (-not $dirSizes.ContainsKey($dir)) {
                $dirSizes[$dir] = [int64]0
              }
              $dirSizes[$dir] += $file.Length
            }
            $dirSizes.GetEnumerator() |
              Sort-Object Value -Descending |
              ForEach-Object {
                [pscustomobject]@{
                  FullName = $_.Key
                  Length = $_.Value
                }
              } |
              Export-Csv -NoTypeInformation -Path (Join-Path $reportDir "$prefix-directories-by-size.csv")

            Write-Host "##[endgroup]"
          }

          Show-TreeStats "stage1 lib" $stage1Lib "stage1-lib"
          Show-TreeStats "snapshot lib" $snapshotLib "snapshot-lib"

          @(
            "hostTriple=$hostTriple"
            "stage1Lib=$stage1Lib"
            "snapshotLib=$snapshotLib"
          ) | Set-Content -Path (Join-Path $reportDir "paths.txt")

      - name: Package standalone toolchain (Windows)
        if: ${{ matrix.is_windows && false }}
        shell: pwsh
        run: |
          $hostTriple = "${{ matrix.host_triple }}"
          $toolchainDir = Join-Path $env:GITHUB_WORKSPACE "tc32-stage1-$hostTriple"
          $snapshotRustc = (rustup which rustc).Trim()
          $snapshotSysroot = (& $snapshotRustc --print sysroot).Trim()
          function Copy-SysrootLib([string]$sourceLibDir, [string]$destLibDir) {
            $sourceLibDir = (Resolve-Path $sourceLibDir).Path
            New-Item -ItemType Directory -Force -Path $destLibDir | Out-Null
            $excludeDirs = @(
              (Join-Path $sourceLibDir "rustlib\\src"),
              (Join-Path $sourceLibDir "rustlib\\rustc-src")
            ) | Where-Object { Test-Path $_ }
            $robocopyArgs = @(
              $sourceLibDir,
              $destLibDir,
              '/E',
              '/NFL',
              '/NDL',
              '/NJH',
              '/NJS',
              '/NP'
            )
            if ($excludeDirs.Count -gt 0) {
              $robocopyArgs += '/XD'
              $robocopyArgs += $excludeDirs
            }
            & robocopy @robocopyArgs | Out-Null
            if ($LASTEXITCODE -ge 8) {
              throw "robocopy failed with exit code $LASTEXITCODE"
            }
          }
          Remove-Item -Recurse -Force $toolchainDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path `
            (Join-Path $toolchainDir "bin"), `
            (Join-Path $toolchainDir "lib"), `
            (Join-Path $toolchainDir "llvm/bin"), `
            (Join-Path $toolchainDir "llvm/lib"), `
            (Join-Path $toolchainDir "snapshot/bin"), `
            (Join-Path $toolchainDir "snapshot/lib") | Out-Null

          Copy-Item "build/bootstrap/debug/rustc.exe" (Join-Path $toolchainDir "bin/rustc-bootstrap.exe")
          Copy-Item "build/$hostTriple/stage1/bin/rustc.exe" (Join-Path $toolchainDir "bin/rustc-real.exe")
          Copy-Item "build/$hostTriple/stage1-tools-bin/cargo.exe" (Join-Path $toolchainDir "bin/cargo-real.exe")
          Copy-Item $snapshotRustc (Join-Path $toolchainDir "snapshot/bin/rustc.exe")
          Copy-SysrootLib "build/$hostTriple/stage1/lib" (Join-Path $toolchainDir "lib")
          Copy-SysrootLib (Join-Path $snapshotSysroot "lib") (Join-Path $toolchainDir "snapshot/lib")
          Copy-Item "$env:GITHUB_WORKSPACE/llvm-toolchain/bin/*" (Join-Path $toolchainDir "llvm/bin") -Recurse
          if (Test-Path "$env:GITHUB_WORKSPACE/llvm-toolchain/lib/clang") {
            Copy-Item "$env:GITHUB_WORKSPACE/llvm-toolchain/lib/clang" (Join-Path $toolchainDir "llvm/lib") -Recurse
          }

          $toolchainToml = @"
          host_triple = "$hostTriple"
          target_triple = "tc32-unknown-none-elf"
          channel = "stage1-local"

          [paths]
          cargo = "bin/cargo.cmd"
          rustc = "bin/rustc.cmd"
          real_rustc = "bin/rustc-real.exe"
          bootstrap_rustc = "bin/rustc-bootstrap.exe"
          snapshot_rustc = "snapshot/bin/rustc.exe"
          sysroot = "."
          llvm_bin = "llvm/bin"
          "@
          Set-Content -Path (Join-Path $toolchainDir "toolchain.toml") -Value $toolchainToml

          $rustcCmd = @"
          @echo off
          setlocal EnableDelayedExpansion
          set "ROOT=%~dp0.."
          set "ARGS=%*"
          set "TARGET_ARG="
          set "VERSION_QUERY=0"
          :scan
          if "%~1"=="" goto scanned
          if "%~1"=="-vV" set "VERSION_QUERY=1"
          if "%~1"=="--target" (
            set "TARGET_ARG=%~2"
            shift
          ) else (
            set "ARG1=%~1"
            if /I "!ARG1:~0,9!"=="--target=" set "TARGET_ARG=!ARG1:~9!"
          )
          shift
          goto scan
          :scanned
          if defined TARGET_ARG goto target_mode
          if "%VERSION_QUERY%"=="1" goto target_mode
          set "PATH=%ROOT%\snapshot\lib;%PATH%"
          "%ROOT%\snapshot\bin\rustc.exe" %ARGS%
          exit /b %ERRORLEVEL%
          :target_mode
          set "PATH=%ROOT%\lib;%PATH%"
          "%ROOT%\bin\rustc-real.exe" %ARGS% --sysroot "%ROOT%"
          exit /b %ERRORLEVEL%
          "@
          Set-Content -Path (Join-Path $toolchainDir "bin/rustc.cmd") -Value $rustcCmd

          $cargoCmd = @"
          @echo off
          setlocal
          set "ROOT=%~dp0.."
          if not defined RUSTC set "RUSTC=%ROOT%\bin\rustc.cmd"
          if not defined TC32_LLVM_BIN set "TC32_LLVM_BIN=%ROOT%\llvm\bin"
          if not defined CARGO_TARGET_TC32_UNKNOWN_NONE_ELF_LINKER set "CARGO_TARGET_TC32_UNKNOWN_NONE_ELF_LINKER=%ROOT%\llvm\bin\ld.lld.exe"
          "%ROOT%\bin\cargo-real.exe" %*
          "@
          Set-Content -Path (Join-Path $toolchainDir "bin/cargo.cmd") -Value $cargoCmd

          $zipPath = Join-Path $env:GITHUB_WORKSPACE "tc32-rust-toolchain-${{ matrix.host }}.zip"
          if (Test-Path $zipPath) {
            Remove-Item -Force $zipPath
          }
          & tar.exe -a -c -f $zipPath -C $env:GITHUB_WORKSPACE ("tc32-stage1-$hostTriple")
          if ($LASTEXITCODE -ne 0) {
            throw "tar.exe failed with exit code $LASTEXITCODE"
          }

      - name: Upload standalone toolchain artifact (Unix)
        if: ${{ !matrix.is_windows }}
        uses: actions/upload-artifact@v4
        with:
          name: tc32-rust-toolchain-${{ matrix.host }}
          if-no-files-found: error
          path: |
            tc32-rust-toolchain-${{ matrix.host }}.tar.gz
            tc32-rust-toolchain-${{ matrix.host }}.zip

      - name: Upload packaging report artifact (Windows)
        if: matrix.is_windows
        uses: actions/upload-artifact@v4
        with:
          name: tc32-rust-toolchain-${{ matrix.host }}-report
          if-no-files-found: error
          path: windows-packaging-report

  publish-prerelease:
    needs:
      - resolve-llvm-run
      - build-host
    if: github.event_name != 'pull_request'
    name: Publish prerelease
    runs-on: ubuntu-latest
    steps:
      - name: Download standalone toolchain artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: tc32-rust-toolchain-*
          path: release-artifacts
          merge-multiple: true

      - name: Write release notes
        shell: bash
        run: |
          set -euo pipefail
          cat > release-notes.md <<EOF
          TC32 Rust stage1 host toolchain prerelease for \`${{ github.ref_name }}\`.

          Source commit: \`${{ github.sha }}\`
          Rust workflow run: \`${{ github.run_id }}\`
          LLVM workflow run: \`${{ needs.resolve-llvm-run.outputs.run_id }}\`

          Included host artifacts:
          - linux-amd64
          - macos-arm64
          - windows-amd64
          EOF

      - name: Publish GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: tc32-stage1-${{ github.ref_name }}-${{ github.run_number }}
          name: TC32 Rust stage1 ${{ github.ref_name }} #${{ github.run_number }}
          prerelease: true
          generate_release_notes: false
          body_path: release-notes.md
          files: release-artifacts/*
